spring:

  application:
    name: backend

  server:
    address: 0.0.0.0

  datasource:
    url: jdbc:sqlite:/database/database.db
    driver-class-name: org.sqlite.JDBC

  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect

  devtools:
    restart:
      enabled: true
      poll-interval: 2s
      quiet-period: 1s

CorsAllowedOrigin: http://localhost:5173