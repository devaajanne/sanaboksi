spring:
  application:
    name: backend
  server:
    address: 0.0.0.0
  datasource:
    # Datasource variables from compose
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always
      schema-locations:
        - classpath:/databaseInit/schema.sql
      data-locations:
        - classpath:/databaseInit/finnishWords/finnish-5-letter-words.sql
        - classpath:/databaseInit/finnishWords/finnish-6-letter-words.sql
        - classpath:/databaseInit/finnishWords/finnish-7-letter-words.sql
      continue-on-error: false
  jpa:
    hibernate:
      ddl-auto: none
  devtools:
    restart:
      enabled: true
      poll-interval: 2s
      quiet-period: 1s
logging:
  level:
    org.springframework.jdbc.datasource.init: DEBUG

# Cors allowed origin from compose
CorsAllowedOrigin: ${CORS_ALLOWED_ORIGIN}