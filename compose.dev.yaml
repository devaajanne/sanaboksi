name: sanaboksi_dev

services:
  database_dev:
    container_name: sanaboksi_database_dev
    image: postgres:18.1
    restart: always
    ports:
      - "5432:5432"
    networks:
      - network_dev
    environment:
      # Environment variables are configured in .env file
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME_DEV}
    volumes:
      - data_dev:/var/lib/postgresql
    healthcheck:
      # Environment variables are configured in .env file
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME_DEV}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend_dev:
    container_name: sanaboksi_backend_dev
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    networks:
      - network_dev
    environment:
      # Environment variables are configured in .env file (and passed to Spring Boot configuration)
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL_DEV}
      SPRING_DATASOURCE_USERNAME: ${DATABASE_USER}
      SPRING_DATASOURCE_PASSWORD: ${DATABASE_PASSWORD}
      CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN}
    depends_on:
      database_dev:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    develop:
      watch:
        - action: sync
          path: ./backend/src
          target: /workdir/src
          ignore:
            - "**/*.class"

  frontend_dev:
    container_name: sanaboksi_frontend_dev
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    networks:
      - network_dev
    environment:
      # Environment variables are configured in .env file
      VITE_USE_POLLING: ${VITE_USE_POLLING}
      VITE_SERVER_URL: ${VITE_SERVER_URL}
    depends_on:
      backend_dev:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /workdir
          ignore:
            - node_modules/

networks:
  network_dev:
    driver: bridge

volumes:
  data_dev: