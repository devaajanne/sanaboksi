name: sanaboksi_dev

services:
  database_dev:
    # Dev database
    container_name: sanaboksi_database_dev
    image: postgres:18.1
    restart: always
    volumes:
      - data_dev:/var/lib/postgresql
    ports:
      # Port variables are configured in .env file
      - "${DATABASE_HOST_DEV_PORT}:5432"
    networks:
      - network_dev
    environment:
      # Environment variables are configured in .env file
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    healthcheck:
      # Environment variables are configured in .env file
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend_dev:
    # Dev backend
    container_name: sanaboksi_backend_dev
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      # Port variables are configured in .env file
      - "${BACKEND_HOST_PORT}:8080"
    networks:
      - network_dev
    environment:
      # Environment variables are configured in .env file (and passed to application.yaml)
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_DEV_URL}
      SPRING_DATASOURCE_USERNAME: ${DATABASE_USER}
      SPRING_DATASOURCE_PASSWORD: ${DATABASE_PASSWORD}
    depends_on:
      database_dev:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend_dev:
    # Dev frontend
    container_name: sanaboksi_frontend_dev
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      # Port variables are configured in .env file
      - "${FRONTEND_HOST_PORT}:5173"
    networks:
      - network_dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend_dev:
        condition: service_healthy

networks:
  network_dev:
    driver: bridge

volumes:
  data_dev: