name: sanaboksi_dev

services:

  backend_dev:
    container_name: sanaboksi_backend_dev
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    networks:
      - network_dev
    volumes:
      - ./backend/src/main/resources/database:/database
    environment:
      # Environment variables are configured in .env file (and passed to Spring Boot configuration)
      CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    develop:
      watch:
        - action: sync
          path: ./backend/src
          target: /workdir/src
          ignore:
            - "**/*.class"

  frontend_dev:
    container_name: sanaboksi_frontend_dev
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    networks:
      - network_dev
    environment:
      # Environment variables are configured in .env file
      VITE_USE_POLLING: ${VITE_USE_POLLING}
      VITE_SERVER_URL: ${VITE_SERVER_URL}
    depends_on:
      backend_dev:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /workdir
          ignore:
            - node_modules/

networks:
  network_dev:
    driver: bridge