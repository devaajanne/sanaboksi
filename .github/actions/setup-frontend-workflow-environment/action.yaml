name: Set up frontend workflow environment

runs:
  using: "composite"
  steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: "24"
    
    - name: Install dependencies
      shell: bash
      run: |
        cd frontend
        npm install