name: Continuous Integration (CI)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  run-backend-formatting-check:
    name: BE formatting check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Set up backend workflow environment
        uses: ./.github/actions/setup-backend-workflow-environment

      - name: Run BE formatting check
        run: |
          cd backend
          ./gradlew spotlessCheck
  
  run-frontend-formatting-check:
    name: FE formatting check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up frontend workflow environment
        uses: ./.github/actions/setup-frontend-workflow-environment

      - name: Run FE formatting check
        run: |
          cd frontend
          npx prettier . --check

  run-frontend-linting-check:
    name: FE linting check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up frontend workflow environment
        uses: ./.github/actions/setup-frontend-workflow-environment

      - name: Run FE linting check
        run: |
          cd frontend
          npx eslint .

  run-backend-unit-tests:
    name: BE unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Set up backend workflow environment
        uses: ./.github/actions/setup-backend-workflow-environment
      
      - name: Run BE unit tests
        run: |
          cd backend
          ./gradlew unitTest

      - name: Upload unit test report on test failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v6
        with:
          name: unit-test-report
          path: backend/build/reports/tests/unitTest/
  
  run-backend-integration-tests:
    name: BE integration tests
    runs-on: ubuntu-latest
    needs: [run-backend-unit-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Set up backend workflow environment
        uses: ./.github/actions/setup-backend-workflow-environment

      - name: Seed database
        env:
          SQLITE_DB_PATH: ./database/database.db
        run: |
          cd backend/src/main/resources/databaseInit
          chmod +x ./reseed_database.sh
          ./reseed_database.sh
      
      - name: Run BE integration tests
        env:
          CORS_ALLOWED_ORIGIN: http://localhost:5173
        run: |
          cd backend
          ./gradlew integrationTest

      - name: Upload integration test report on test failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v6
        with:
          name: integration-test-report
          path: backend/build/reports/tests/integrationTest/

  run-end-to-end-tests:
    name: End-to-end tests
    runs-on: ubuntu-latest
    needs: [run-backend-integration-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up frontend workflow environment
        uses: ./.github/actions/setup-frontend-workflow-environment

      - name: Install Playwright Browsers
        run: |
          cd frontend
          npx playwright install --with-deps

      - name: Build Docker containers
        run: docker compose -f compose.yaml up --build -d
        env:
          CORS_ALLOWED_ORIGIN: http://localhost:5173
          VITE_SERVER_URL: http://localhost:8080
    
      - name: Show database logs on container build failure
        if: ${{ failure() }}
        run: docker logs sanaboksi_database

      - name: Show backend logs on container build failure
        if: ${{ failure() }}
        run: docker logs sanaboksi_backend

      - name: Show frontend logs on container build failure
        if: ${{ failure() }}
        run: docker logs sanaboksi_frontend

      - name: Wait for frontend to be ready
        run: |
          until curl --output /dev/null --silent --head --fail http://localhost:5173; do sleep 5; done

      - name: Run end-to-end tests
        run: |
          cd frontend
          npx playwright test

      - name: Upload Playwright report on test failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: frontend/test-results/